stages:
  - validate
  - test
  - deploy

validate_tables:
  stage: validate
  image: python:3.10
  script:
    - pip install --quiet -r goldengate-automation/requirements.txt
    - python goldengate-automation/scripts/validate_tables.py goldengate-automation/tables
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test_goldengate:
  stage: test
  image: docker:stable
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - apk add --no-cache python3 py3-pip
    - pip install --quiet docker
    - python goldengate-automation/scripts/test_goldengate.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  needs: ["validate_tables"]

deploy_goldengate:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
  script:
    - goldengate-automation/scripts/deploy_goldengate.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
  needs: ["validate_tables", "test_goldengate"]
